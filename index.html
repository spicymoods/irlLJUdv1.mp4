
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Watch On Videy</title>

<script src="https://acquitfamouscavity.com/f1/14/0e/f1140eec63796442ab98d9e99662ae92.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    font-family:-apple-system,"Segoe UI",sans-serif;
    color:#111;
    min-height:100vh;
}

/* HEADER */
.site-header{
    background:#fff;
    height:56px;
    padding:0 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #e8e8e8;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
}

.site-logo{
    font-size:20px;
    font-weight:900;
    color:#ff3b3b;
}

.site-logo span{
    color:#111;
}

.tg-btn{
    background:#229ED9;
    color:#fff;
    text-decoration:none;
    padding:8px 14px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
}

/* CONTAINER */
.main{
    max-width:900px;
    margin:auto;
    padding:20px 16px 40px;
}

/* PLAYER */
.player-card{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 2px 16px rgba(0,0,0,.08);
    margin-bottom:20px;
}

.player-wrap{
    background:#000;
    aspect-ratio:16/9;
}

video{
    width:100%;
    height:100%;
    display:block;
}

.share-bar{
    padding:12px 16px;
    display:flex;
    justify-content:flex-end;
    border-top:1px solid #eee;
}

.share-btn{
    background:#f0f0f0;
    border:1px solid #ddd;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.share-btn.copied{
    background:#e8f5e9;
    color:#2e7d32;
}

/* TELEGRAM */
.tg-cta{
    display:flex;
    align-items:center;
    gap:16px;
    padding:20px;
    background:linear-gradient(135deg,#1a73e8,#229ED9);
    color:#fff;
    text-decoration:none;
    border-radius:14px;
    margin-bottom:20px;
}

.tg-icon{
    font-size:36px;
}

.tg-arrow{
    margin-left:auto;
    font-size:24px;
}

/* AGE MODAL */
.age-modal{
    display:none;
    position:fixed;
    inset:0;
    z-index:9999;
    align-items:center;
    justify-content:center;
}

.age-modal.show{
    display:flex;
}

.age-box{
    width:90%;
    max-width:300px;
    background:#fff;
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
}

.age-box .icon{
    font-size:32px;
    margin-bottom:8px;
}

.age-box p{
    color:#666;
    margin:10px 0 16px;
}

.age-btn{
    display:block;
    background:linear-gradient(135deg,#ff3b3b,#ff6b35);
    color:#fff;
    text-decoration:none;
    padding:12px;
    border-radius:8px;
    font-weight:700;
}

/* ADS */
.native-section{
    background:#fff;
    border-radius:14px;
    padding:20px;
}
</style>
</head>

<!-- HEADER -->
<header class="site-header">

    <div class="site-logo">
    </div>

</header>

<div class="main">

    <!-- PLAYER -->
    <div class="player-card">

        <div class="player-wrap">
            <video
                controls
                autoplay
                playsinline
                preload="metadata"
                src="https://cdn.videy.co/irlLJUdv1.mp4">
            </video>
        </div>

    </div>

    <!-- ADS -->
    <div class="native-section">


    </div>

</div>

<script>

const SHORT_LINK =
"https://cdn.videy.co/irlLJUdv1.mp4";

setTimeout(function(){
    document.getElementById("ageModal")
            .classList.add("show");
},4000);

function doShare(){

    navigator.clipboard.writeText(SHORT_LINK)
    .then(function(){

        let btn = document.getElementById("shareBtn");

        btn.textContent = "✅ Tersalin!";
        btn.classList.add("copied");

        setTimeout(function(){

            btn.textContent = "📋 Share Link";
            btn.classList.remove("copied");

        },2000);

    });

}

</script>
